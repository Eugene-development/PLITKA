version: "3.8"

services:
  # Laravel Backend Application (zov-auth)
  plitka-auth-app:
    image: larux/plitka-auth:latest
    container_name: plitka-prod-auth-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - auth_storage:/var/www/storage
      - auth_cache:/var/www/bootstrap/cache
      - auth_public:/var/www/public
    networks:
      - auth-network
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stack
      - LOG_LEVEL=error
    secrets:
      - jwt_secret

  # Backend Nginx Proxy (zov-auth)
  plitka-auth-nginx:
    image: nginx:alpine
    container_name: plitka-prod-auth-nginx
    restart: unless-stopped
    ports:
      - "7144:80"
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - auth_storage:/var/www/storage:ro
      - auth_public:/var/www/public:ro
    networks:
      - auth-network
    depends_on:
      - plitka-auth-app

networks:
  auth-network:
    name: plitka-auth-network
    driver: bridge

volumes:
  auth_storage:
    name: plitka-auth-storage
  auth_cache:
    name: plitka-auth-cache
  auth_public:
    name: plitka-auth-public

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret
