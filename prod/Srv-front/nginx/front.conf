# Simple SvelteKit Plitka Frontend Configuration
server {
    listen 80;
    server_name _;

    # Logging
    access_log /var/log/nginx/front_access.log;
    error_log /var/log/nginx/front_error.log;

    # Basic Settings
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Proxy to SvelteKit agent app
    location / {
        proxy_pass http://plitka-front-app:9999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Caching
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }

    # Static Assets from SvelteKit build
    location /_app/ {
        proxy_pass http://plitka-front-app:9999;
        
        # Short-term caching for testing
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
        
        # Compression
        gzip_static on;
    }

    # Favicon and other root assets
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp)$ {
        proxy_pass http://plitka-front-app:9999;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Service Worker
    location /service-worker.js {
        proxy_pass http://plitka-front-app:9999;
        add_header Cache-Control "no-cache";
        expires -1;
    }

    # Simple health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://plitka-front-app:9999;
        access_log off;
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://plitka-front-app:9999;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}